<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>앱 업데이트</title>
    <style>
      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        font-family: "Segoe UI", "Apple SD Gothic Neo", Arial, sans-serif;
        color: #1f2933;
        background: #f4f7f8;
      }

      main {
        width: min(420px, calc(100vw - 32px));
        border: 1px solid #d6dee6;
        border-radius: 10px;
        padding: 24px;
        background: #fff;
        box-shadow: 0 16px 38px rgba(36, 55, 70, 0.1);
      }

      h1 {
        margin: 0 0 10px;
        font-size: 22px;
      }

      p {
        margin: 0;
        color: #687582;
        line-height: 1.55;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>앱 업데이트 중</h1>
      <p>저장된 여행 데이터는 유지하고, 오래된 앱 캐시만 지우고 있습니다.</p>
    </main>
    <script>
      async function resetAppCache() {
        if ("serviceWorker" in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map((registration) => registration.unregister()));
        }

        if ("caches" in window) {
          const keys = await caches.keys();
          await Promise.all(keys.map((key) => caches.delete(key)));
        }

        window.location.replace("./index.html?v=20260618-reset-cache");
      }

      resetAppCache().catch(() => {
        window.location.replace("./index.html?v=20260618-reset-cache");
      });
    </script>
  </body>
</html>
